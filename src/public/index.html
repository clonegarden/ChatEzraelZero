<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Ezrael Noetiko - Middleware AI</title>
  <script defer src="frontend.js"></script>
  <style>
    :root {
      --primary: #512da8;
      --secondary: #311b92;
      --background-dark: #1e2235;
      --accent: #82b1ff;
      --text-light: #e0e0e0;
      --glow: #69f0ae;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--background-dark);
      color: var(--text-light);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid var(--accent);
    }

    header {
      background: rgba(49, 27, 146, 0.8);
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid var(--accent);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0;
      color: var(--glow);
      text-shadow: 0px 0px 5px var(--glow);
    }

    .subtitle {
      font-size: 1rem;
      opacity: 0.8;
    }

    .status-bar {
      padding: 12px;
      text-align: center;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      background-color: rgba(0, 0, 0, 0.3);
      margin-bottom: 10px;
    }

    .chat-container {
      height: 60vh;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 15px;
    }

    .message {
      max-width: 85%;
      padding: 12px 18px;
      border-radius: 18px;
      line-height: 1.5;
      backdrop-filter: blur(10px);
      background: rgba(49, 27, 146, 0.8);
      border: 1px solid var(--accent);
    }

    .message.user {
      align-self: flex-end;
      background: rgba(81, 45, 168, 0.8);
    }

    .typing {
      opacity: 0.7;
      background: rgba(0, 0, 0, 0.8) !important;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    .input-container {
      padding: 15px;
      display: flex;
      background: rgba(49, 27, 146, 0.8);
      border-top: 1px solid var(--accent);
    }

    #chat-input {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 50px;
      background: rgba(0, 0, 0, 0.6);
      color: var(--text-light);
      font-size: 1rem;
      outline: none;
    }

    #chat-input:focus {
      box-shadow: 0 0 0 2px var(--primary);
    }

    #chat-input::placeholder {
      color: rgba(128, 128, 128, 0.8);
    }

    #send-button {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      margin-left: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      box-shadow: 0 4px 10px rgba(81, 45, 168, 0.5);
    }

    #send-button:hover {
      background: var(--secondary);
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 0.8rem;
      opacity: 0.7;
      border-top: 1px solid var(--accent);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Ezrael Noetiko</h1>
      <div class="subtitle">Middleware de IA Místico</div>
    </header>

    <div id="status-bar" class="status-bar">Iniciando sistema...</div>

    <div id="chat-container" class="chat-container">
      <div class="message bot">
        Olá! Eu sou o Ezrael Noetiko, seu assistente IA místico. Como posso ajudar você hoje?
      </div>
    </div>

    <div class="input-container">
      <input type="text" id="chat-input" placeholder="Digite sua mensagem..." autocomplete="off" />
      <button id="send-button">➤</button>
    </div>

    <footer>
      Conectado ao backend Replit | v1.0
    </footer>
  </div>
</body>
</html>
