<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Ezrael Noetiko - Middleware AI</title>
  <script defer src="frontend.js"></script>
  <style>
    :root {
      --primary: #512da8;
      --secondary: #311b92;
      --background-dark: #1e2235;
      --accent: #82b1ff;
      --text-light: #e0e0e0;
      --glow: #69f0ae;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--background-dark);
      color: var(--text-light);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      overflow: hidden;
      position: relative; /* Needed for animation positioning */
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid var(--accent);
      position: relative; /* For z-index of symbols */
      z-index: 1;
    }

    header {
      background: var(--background-dark);
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid var(--accent);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      position: relative;
    }

    .mystical-symbol-header {
      position: absolute;
      font-size: 2rem;
      opacity: 0.3;
      filter: hue-rotate(120deg);
    }

    .mystical-symbol-header.left {
      top: 10px;
      left: 15px;
    }

    .mystical-symbol-header.right {
      top: 10px;
      right: 15px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0;
      color: #ffffff; /* Change to simple white color */
      text-shadow: none; /* Remove the glow effect */
    }

    .subtitle {
      font-size: 1rem;
      opacity: 0.8;
    }

    .status-bar {
      padding: 12px;
      text-align: center;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      background-color: rgba(0, 0, 0, 0.3);
      margin-bottom: 10px;
    }

    .chat-container {
      height: 60vh;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 15px;
      position: relative; /* For z-index of symbols */
      z-index: 1;
    }

    .message {
      max-width: 85%;
      padding: 12px 18px;
      border-radius: 18px;
      line-height: 1.5;
      backdrop-filter: blur(10px);
      background: var(--background-dark);
      border: 1px solid var(--accent);
    }

    .message.user {
      align-self: flex-end;
      background: var(--background-dark);
    }

    .typing {
      opacity: 0.7;
      background: rgba(0, 0, 0, 0.8) !important;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    .input-container {
      padding: 15px;
      display: flex;
      background: var(--background-dark);
      border-top: 1px solid var(--accent);
    }

    #chat-input {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 50px;
      background: rgba(0, 0, 0, 0.6);
      color: var(--text-light);
      font-size: 1rem;
      outline: none;
    }

    #chat-input:focus {
      box-shadow: 0 0 0 2px var(--primary);
    }

    #chat-input::placeholder {
      color: rgba(128, 128, 128, 0.8);
    }

    #send-button {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      margin-left: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      box-shadow: 0 4px 10px rgba(81, 45, 168, 0.5);
    }

    #send-button:hover {
      background: var(--secondary);
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 0.8rem;
      opacity: 0.7;
      border-top: 1px solid var(--accent);
      position: relative;
    }

    .mystical-symbol-footer {
      position: absolute;
      font-size: 1.5rem;
      opacity: 0.2;
      filter: hue-rotate(240deg);
    }

    .mystical-symbol-footer.left {
      bottom: 5px;
      left: 15px;
    }

    .mystical-symbol-footer.right {
      bottom: 5px;
      right: 15px;
    }

    /* Animation styles */
    .animation-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0; /* Behind other content */
      overflow: hidden;
    }

    .particle {
      position: absolute;
      background-color: rgba(105, 240, 174, 0.6); /* Using --glow color */
      border-radius: 50%;
      opacity: 0;
      animation: particle-animation 5s infinite linear;
    }

    @keyframes particle-animation {
      0% {
        transform: translate(0, 0) rotate(0deg) scale(1);
        opacity: 0;
      }
      20% {
        opacity: 0.8;
      }
      80% {
        transform: translate(var(--translateX), var(--translateY)) rotate(var(--rotate)) scale(var(--scale));
        opacity: 0.5;
      }
      100% {
        transform: translate(var(--translateX), var(--translateY)) rotate(var(--rotate)) scale(var(--scale));
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="animation-container"></div>
  <div class="container">
    <header>
      <span class="mystical-symbol-header left">∴</span>
      <h1>Ezrael Noetiko</h1>
      <span class="mystical-symbol-header right">☿</span>
      <div class="subtitle">Middleware de IA Místico</div>
    </header>

    <div id="status-bar" class="status-bar">Iniciando sistema...</div>

    <div id="chat-container" class="chat-container">
      <div class="message bot">
        Olá! Eu sou o Ezrael Noetiko, seu assistente IA místico. Como posso ajudar você hoje?
      </div>
    </div>

    <div class="input-container">
      <input type="text" id="chat-input" placeholder="Digite sua mensagem..." autocomplete="off" />
      <button id="send-button">➤</button>
    </div>

    <footer>
      <span class="mystical-symbol-footer left">§</span>
      Conectado ao backend Replit | v1.0
      <span class="mystical-symbol-footer right">※</span>
    </footer>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const animationContainer = document.querySelector('.animation-container');
      const numParticles = 50;

      for (let i = 0; i < numParticles; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');

        const size = Math.random() * 20 + 5; // Size between 5px and 25px
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.top = `${Math.random() * 100}%`;

        const translateX = (Math.random() - 0.5) * 400; // Move horizontally up to 200px left/right
        const translateY = (Math.random() - 0.5) * 400; // Move vertically up to 200px up/down
        const rotate = Math.random() * 360;
        const scale = Math.random() * 1.5 + 0.5; // Scale between 0.5x and 2x

        particle.style.setProperty('--translateX', `${translateX}px`);
        particle.style.setProperty('--translateY', `${translateY}px`);
        particle.style.setProperty('--rotate', `${rotate}deg`);
        particle.style.setProperty('--scale', scale);

        // Delay animation start for a staggered effect
        particle.style.animationDelay = `${Math.random() * -5}s`;

        animationContainer.appendChild(particle);
      }
    });
  </script>
</body>
</html>
