<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Ezrael Noetiko - Middleware AI</title>
  <script defer src="frontend.js"></script>
  <style>
    :root {
      --primary: #8B5CF6; /* Purple */
      --secondary: #7C3AED; /* Darker purple */
      --background-dark: #1A1A1A; /* Dark grey like Replit */
      --background-card: #2A2A2A; /* Card background */
      --accent: #F59E0B; /* Golden accent */
      --accent-light: #FCD34D; /* Light golden */
      --text-light: #E5E7EB;
      --text-muted: #9CA3AF;
      --border: #374151;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--background-dark);
      color: var(--text-light);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      overflow: hidden;
      font-weight: 400;
      line-height: 1.5;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: var(--background-card);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }

    header {
      background: var(--background-card);
      padding: 24px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      position: relative;
    }

    .mystical-symbol-header {
      position: absolute;
      font-size: 1.5rem;
      opacity: 0.2;
      color: var(--accent);
      font-weight: 300;
    }

    .mystical-symbol-header.left {
      top: 12px;
      left: 20px;
    }

    .mystical-symbol-header.right {
      top: 12px;
      right: 20px;
    }

    h1 {
      font-size: 2rem;
      margin: 0;
      color: var(--text-light);
      font-weight: 600;
      letter-spacing: -0.025em;
    }

    .subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 4px;
      font-weight: 400;
    }

    /* Login Container Styles */
    .login-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--background-dark);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .login-box {
      background: var(--background-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 32px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }

    .login-title {
      font-size: 1.5rem;
      color: var(--text-light);
      margin-bottom: 24px;
      font-weight: 600;
      letter-spacing: -0.025em;
    }

    .login-title::before {
      content: "⧨";
      color: var(--accent);
      margin-right: 8px;
      font-weight: 300;
    }

    .login-title::after {
      content: "⧨";
      color: var(--accent);
      margin-left: 8px;
      font-weight: 300;
    }

    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: var(--text-light);
      font-size: 0.875rem;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--background-dark);
      color: var(--text-light);
      font-size: 0.875rem;
      box-sizing: border-box;
      transition: border-color 0.15s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .auth-button {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 12px;
      transition: background-color 0.15s ease;
    }

    .auth-button:hover {
      background: var(--secondary);
    }

    .auth-button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .auth-button.secondary:hover {
      background: var(--background-dark);
      color: var(--text-light);
    }

    .error-message {
      color: #ff6b6b;
      font-size: 0.9rem;
      margin-top: 10px;
      padding: 10px;
      background: rgba(255, 107, 107, 0.1);
      border-radius: 4px;
      border: 1px solid rgba(255, 107, 107, 0.3);
    }

    .auth-switch {
      margin-top: 20px;
      font-size: 0.9rem;
      color: var(--text-light);
    }

    .auth-switch a {
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
    }

    .auth-switch a:hover {
      text-decoration: underline;
    }

    .status-bar {
      padding: 12px 20px;
      text-align: center;
      font-size: 0.875rem;
      background: var(--background-card);
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      font-weight: 400;
    }

    .chat-container {
      height: 60vh;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      background: var(--background-card);
    }

    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 6px;
      line-height: 1.5;
      font-size: 0.875rem;
      background: var(--background-dark);
      border: 1px solid var(--border);
    }

    .message.user {
      align-self: flex-end;
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .typing {
      opacity: 0.7;
      background: rgba(0, 0, 0, 0.8) !important;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    .input-container {
      padding: 16px 20px;
      display: flex;
      background: var(--background-card);
      border-top: 1px solid var(--border);
      gap: 12px;
    }

    #chat-input {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--background-dark);
      color: var(--text-light);
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s ease;
    }

    #chat-input:focus {
      border-color: var(--primary);
    }

    #chat-input::placeholder {
      color: var(--text-muted);
    }

    #send-button {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 4px;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.15s ease;
      font-size: 1rem;
    }

    #send-button:hover {
      background: var(--secondary);
    }

    footer {
      text-align: center;
      padding: 12px 20px;
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--background-card);
      border-top: 1px solid var(--border);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .mystical-symbol-footer {
      font-size: 1rem;
      opacity: 0.3;
      color: var(--accent);
    }

  </style>
</head>
<body>
  
  <!-- Login Container -->
  <div id="login-container" class="login-container" style="display: none;">
    <div class="login-box">
      <div class="login-title">⧨ Portal Místico ⧨</div>
      
      <form id="login-form">
        <div class="form-group">
          <label for="username">Usuário</label>
          <input type="text" id="username" name="username" required />
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" required />
        </div>
        <button type="submit" class="auth-button">Entrar</button>
        <button type="button" id="switch-to-register" class="auth-button secondary">Criar Conta</button>
        <div id="auth-error" class="error-message" style="display: none;"></div>
      </form>
      
      <form id="register-form" style="display: none;">
        <div class="form-group">
          <label for="reg-username">Usuário</label>
          <input type="text" id="reg-username" name="username" required />
        </div>
        <div class="form-group">
          <label for="reg-password">Senha</label>
          <input type="password" id="reg-password" name="password" required />
        </div>
        <div class="form-group">
          <label for="reg-confirm-password">Confirmar Senha</label>
          <input type="password" id="reg-confirm-password" name="confirmPassword" required />
        </div>
        <button type="submit" class="auth-button">Criar Conta</button>
        <button type="button" id="switch-to-login" class="auth-button secondary">Já tenho conta</button>
        <div id="register-error" class="error-message" style="display: none;"></div>
      </form>
    </div>
  </div>

  <div class="container">
    <header>
      <span class="mystical-symbol-header left">∴</span>
      <h1>Ezrael Noetiko</h1>
      <span class="mystical-symbol-header right">☿</span>
      <div class="subtitle">Middleware de IA Místico</div>
    </header>

    <div id="status-bar" class="status-bar">Iniciando sistema...</div>

    <div id="chat-container" class="chat-container">
      <div class="message bot">
        Olá! Eu sou o Ezrael Noetiko, seu assistente IA místico. Como posso ajudar você hoje?
      </div>
    </div>

    <div class="input-container">
      <input type="text" id="chat-input" placeholder="Digite sua mensagem..." autocomplete="off" />
      <button id="send-button">➤</button>
    </div>

    <footer>
      <span class="mystical-symbol-footer left">§</span>
      Conectado ao backend Replit | v1.0
      <button id="logout-button" style="background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; transition: all 0.15s ease;">Sair</button>
      <span class="mystical-symbol-footer right">※</span>
    </footer>
  </div>

</body>
</html>
