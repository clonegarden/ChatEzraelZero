<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Ezrael Noetiko - Middleware AI</title>
  <script defer src="frontend.js"></script>
  <style>
    :root {
      --primary: #2563eb;
      --secondary: #1e40af;
      --light: #dbeafe;
      --dark: #1e293b;
      --success: #10b981;
      --error: #ef4444;
      --warning: #f59e0b;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1e3a8a, #0f172a);
      color: white;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: rgba(15, 23, 42, 0.8);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(100, 130, 200, 0.3);
    }

    header {
      background: rgba(15, 23, 42, 0.9);
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid rgba(100, 130, 200, 0.3);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #60a5fa, #93c5fd);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      font-size: 1rem;
      opacity: 0.7;
    }

    .status-bar {
      padding: 12px;
      text-align: center;
      display: none;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }

    .status-bar.visible { display: block; }
    .status-bar.info { background: rgba(37, 99, 235, 0.2); }
    .status-bar.success { background: rgba(16, 185, 129, 0.2); }
    .status-bar.error { background: rgba(239, 68, 68, 0.2); }
    .status-bar.warning { background: rgba(245, 158, 11, 0.2); }

    .chat-container {
      height: 60vh;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      background: rgba(15, 23, 42, 0.6);
    }

    .message {
      max-width: 85%;
      padding: 12px 18px;
      border-radius: 18px;
      line-height: 1.5;
      position: relative;
      animation: fadeIn 0.3s ease;
      backdrop-filter: blur(10px);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: rgba(37, 99, 235, 0.3);
      border: 1px solid rgba(96, 165, 250, 0.4);
      border-bottom-right-radius: 5px;
    }

    .message.bot {
      align-self: flex-start;
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(100, 116, 139, 0.4);
      border-bottom-left-radius: 5px;
    }

    .typing {
      opacity: 0.7;
      background: rgba(30, 41, 59, 0.6) !important;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: #93c5fd;
      margin: 0 4px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    .input-container {
      display: flex;
      padding: 15px;
      background: rgba(15, 23, 42, 0.9);
      border-top: 1px solid rgba(100, 116, 139, 0.3);
    }

    #chat-input {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 50px;
      background: rgba(30, 41, 59, 0.8);
      color: white;
      font-size: 1rem;
      outline: none;
      box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.3);
    }

    #chat-input:focus {
      box-shadow: 0 0 0 2px var(--primary);
    }

    #chat-input::placeholder {
      color: rgba(200, 200, 255, 0.5);
    }

    #send-button {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      margin-left: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      transition: all 0.3s;
      box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
    }

    #send-button:hover {
      background: var(--secondary);
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(37, 99, 235, 0.4);
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 0.8rem;
      opacity: 0.6;
      border-top: 1px solid rgba(100, 116, 139, 0.3);
    }

    @media (max-width: 768px) {
      .chat-container { height: 65vh; }
      .message { max-width: 90%; }
      h1 { font-size: 2rem; }
      #chat-input { padding: 12px 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Ezrael Noetiko</h1>
      <div class="subtitle">Middleware de IA com Memória Persistente</div>
    </header>

    <div id="status-bar" class="status-bar">Iniciando sistema...</div>

    <div id="chat-container" class="chat-container">
      <div class="message bot">
        Olá! Eu sou o Ezrael Noetiko, seu assistente de IA com memória persistente.
        Como posso ajudar você hoje?
      </div>
    </div>

    <div class="input-container">
      <input type="text" id="chat-input" placeholder="Digite sua mensagem..." autocomplete="off" />
      <button id="send-button">➤</button>
    </div>

    <footer>
      Conectado ao backend Replit | v1.0
    </footer>
  </div>
</body>
</html>
