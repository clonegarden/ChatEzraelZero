<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Ezrael Noetiko - Middleware AI</title>
  <script defer src="frontend.js"></script>
  <style>
    :root {
      --primary: #8B5CF6; /* Purple */
      --secondary: #7C3AED; /* Darker purple */
      --background-dark: #1A1A1A; /* Dark grey like Replit */
      --background-card: #2A2A2A; /* Card background */
      --accent: #F59E0B; /* Golden accent */
      --accent-light: #FCD34D; /* Light golden */
      --text-light: #E5E7EB;
      --text-muted: #9CA3AF;
      --border: #374151;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--background-dark);
      color: var(--text-light);
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      overflow: hidden;
      font-weight: 400;
      line-height: 1.5;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: var(--background-card);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }

    header {
      background: var(--background-card);
      padding: 24px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      position: relative;
    }

    .mystical-symbol-header {
      position: absolute;
      font-size: 1.5rem;
      opacity: 0.2;
      color: var(--accent);
      font-weight: 300;
    }

    .mystical-symbol-header.left {
      top: 12px;
      left: 20px;
    }

    .mystical-symbol-header.right {
      top: 12px;
      right: 20px;
    }

    h1 {
      font-size: 2rem;
      margin: 0;
      color: var(--text-light);
      font-weight: 600;
      letter-spacing: -0.025em;
    }

    .subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-top: 4px;
      font-weight: 400;
    }

    /* Login Container Styles */
    .login-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--background-dark);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .login-box {
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid var(--accent);
      border-radius: 16px;
      padding: 40px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
    }

    .login-title {
      font-size: 2rem;
      color: var(--accent);
      margin-bottom: 30px;
      text-shadow: 0 0 10px var(--accent);
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-light);
      font-size: 0.9rem;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--secondary);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.6);
      color: var(--text-light);
      font-size: 1rem;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(0, 255, 255, 0.2);
    }

    .auth-button {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      margin-bottom: 15px;
      transition: background 0.3s;
    }

    .auth-button:hover {
      background: var(--secondary);
    }

    .auth-button.secondary {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
    }

    .auth-button.secondary:hover {
      background: var(--accent);
      color: var(--background-dark);
    }

    .error-message {
      color: #ff6b6b;
      font-size: 0.9rem;
      margin-top: 10px;
      padding: 10px;
      background: rgba(255, 107, 107, 0.1);
      border-radius: 4px;
      border: 1px solid rgba(255, 107, 107, 0.3);
    }

    .auth-switch {
      margin-top: 20px;
      font-size: 0.9rem;
      color: var(--text-light);
    }

    .auth-switch a {
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
    }

    .auth-switch a:hover {
      text-decoration: underline;
    }

    .status-bar {
      padding: 12px;
      text-align: center;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      background-color: rgba(0, 0, 0, 0.3);
      margin-bottom: 10px;
    }

    .chat-container {
      height: 60vh;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 15px;
      position: relative; /* For z-index of symbols */
      z-index: 1;
    }

    .message {
      max-width: 85%;
      padding: 12px 18px;
      border-radius: 18px;
      line-height: 1.5;
      backdrop-filter: blur(10px);
      background: var(--background-dark);
      border: 1px solid var(--accent);
    }

    .message.user {
      align-self: flex-end;
      background: var(--background-dark);
    }

    .typing {
      opacity: 0.7;
      background: rgba(0, 0, 0, 0.8) !important;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    .input-container {
      padding: 15px;
      display: flex;
      background: var(--background-dark);
      border-top: 1px solid var(--accent);
    }

    #chat-input {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 50px;
      background: rgba(0, 0, 0, 0.6);
      color: var(--text-light);
      font-size: 1rem;
      outline: none;
    }

    #chat-input:focus {
      box-shadow: 0 0 0 2px var(--primary);
    }

    #chat-input::placeholder {
      color: rgba(128, 128, 128, 0.8);
    }

    #send-button {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 4px; /* Change to square shape */
      width: 50px;
      height: 50px;
      margin-left: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      box-shadow: 0 4px 10px rgba(0, 128, 128, 0.5); /* Teal shadow */
    }

    #send-button:hover {
      background: var(--secondary);
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 0.8rem;
      opacity: 0.7;
      border-top: 1px solid var(--accent);
      position: relative;
    }

    .mystical-symbol-footer {
      position: absolute;
      font-size: 1.5rem;
      opacity: 0.2;
      filter: hue-rotate(240deg);
    }

    .mystical-symbol-footer.left {
      bottom: 5px;
      left: 15px;
    }

    .mystical-symbol-footer.right {
      bottom: 5px;
      right: 15px;
    }

    /* Animation styles */
    .animation-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0; /* Behind other content */
      overflow: hidden;
    }

    .particle {
      position: absolute;
      background-color: rgba(255, 255, 255, 0.2); /* White with low opacity */
      border-radius: 50%;
      opacity: 0;
      animation: particle-animation 5s infinite linear;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: black; /* Black symbols */
    }

    @keyframes particle-animation {
      0% {
        transform: translate(0, 0) rotate(0deg) scale(1);
        opacity: 0;
      }
      20% {
        opacity: 0.8;
      }
      80% {
        transform: translate(var(--translateX), var(--translateY)) rotate(var(--rotate)) scale(var(--scale));
        opacity: 0.5;
      }
      100% {
        transform: translate(var(--translateX), var(--translateY)) rotate(var(--rotate)) scale(var(--scale));
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="animation-container"></div>
  
  <!-- Login Container -->
  <div id="login-container" class="login-container" style="display: none;">
    <div class="login-box">
      <div class="login-title">⧨ Portal Místico ⧨</div>
      
      <form id="login-form">
        <div class="form-group">
          <label for="username">Usuário</label>
          <input type="text" id="username" name="username" required />
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" required />
        </div>
        <button type="submit" class="auth-button">Entrar</button>
        <button type="button" id="switch-to-register" class="auth-button secondary">Criar Conta</button>
        <div id="auth-error" class="error-message" style="display: none;"></div>
      </form>
      
      <form id="register-form" style="display: none;">
        <div class="form-group">
          <label for="reg-username">Usuário</label>
          <input type="text" id="reg-username" name="username" required />
        </div>
        <div class="form-group">
          <label for="reg-password">Senha</label>
          <input type="password" id="reg-password" name="password" required />
        </div>
        <div class="form-group">
          <label for="reg-confirm-password">Confirmar Senha</label>
          <input type="password" id="reg-confirm-password" name="confirmPassword" required />
        </div>
        <button type="submit" class="auth-button">Criar Conta</button>
        <button type="button" id="switch-to-login" class="auth-button secondary">Já tenho conta</button>
        <div id="register-error" class="error-message" style="display: none;"></div>
      </form>
    </div>
  </div>

  <div class="container">
    <header>
      <span class="mystical-symbol-header left">∴</span>
      <h1>Ezrael Noetiko</h1>
      <span class="mystical-symbol-header right">☿</span>
      <div class="subtitle">Middleware de IA Místico</div>
    </header>

    <div id="status-bar" class="status-bar">Iniciando sistema...</div>

    <div id="chat-container" class="chat-container">
      <div class="message bot">
        Olá! Eu sou o Ezrael Noetiko, seu assistente IA místico. Como posso ajudar você hoje?
      </div>
    </div>

    <div class="input-container">
      <input type="text" id="chat-input" placeholder="Digite sua mensagem..." autocomplete="off" />
      <button id="send-button">➤</button>
    </div>

    <footer>
      <span class="mystical-symbol-footer left">§</span>
      Conectado ao backend Replit | v1.0
      <button id="logout-button" style="background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; margin-left: 10px;">Sair</button>
      <span class="mystical-symbol-footer right">※</span>
    </footer>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const animationContainer = document.querySelector('.animation-container');
      const numParticles = 50;

      for (let i = 0; i < numParticles; i++) {
        const particle = document.createElement('div');
        particle.classList.add('particle');

        const size = Math.random() * 20 + 5; // Size between 5px and 25px
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.top = `${Math.random() * 100}%`;

        const translateX = (Math.random() - 0.5) * 400; // Move horizontally up to 200px left/right
        const translateY = (Math.random() - 0.5) * 400; // Move vertically up to 200px up/down
        const rotate = Math.random() * 360;
        const scale = Math.random() * 1.5 + 0.5; // Scale between 0.5x and 2x

        particle.style.setProperty('--translateX', `${translateX}px`);
        particle.style.setProperty('--translateY', `${translateY}px`);
        particle.style.setProperty('--rotate', `${rotate}deg`);
        particle.style.setProperty('--scale', scale);

        // Delay animation start for a staggered effect
        particle.style.animationDelay = `${Math.random() * -5}s`;

        animationContainer.appendChild(particle);
      }
    });
  </script>
</body>
</html>
